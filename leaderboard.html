<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="icon" href="assets/Img/favicon.ico">
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
    <link rel="stylesheet" type="text/css" href="assets/css/header.css">
    <link rel="stylesheet" type="text/css" href="assets/css/redeems.css">
    <link rel="stylesheet" type="text/css" href="assets/css/table.css">
</head>

<body>
    <header>
        <nav>
            <div class="navBox">
                <a class="navLink" href="index.html"><img id="img" src="assets/Img/BackArrowImg.png" alt="[Back Arrow]" width="20" height="20">Home Page</a>
            </div>
        </nav>
    </header>

    <main>
        <span class="optionContainer">
            <label>
                Select Month:
                <select class="bgAndColor" name="selectMonth" id="monthSelector">
                    <option value="select" selected="selected">--Select Month--</option>
                    <option value="26-04">Mar / Apr 26</option>
                    <option value="26-02">Feb 26</option>
                    <option value="26-01">Jan 26</option>
                    <option value="25-12">Nov / Dec 25</option>
                    <option value="25-10">Oct 25</option>
                    <option value="25-09">Sept 25</option>
                    <option value="25-08">Aug 25</option>
                    <option value="25-07">Jun / Jul 25</option>
                    <option value="25-05">May 25</option>
                    <option value="25-04">Apr 25</option>
                    <option value="all">All</option>
                </select>
            </label>
            <button id="applyMonthsButton" class="bgAndColor fontSize">Enter</button>
        </span>

        <div id="selectedMonthsContainer" class="optionContainer" hidden>
            <span><u>Selected Months:</u></span>
            <br>
        </div>

        <table id="leaderboardTable" class="leaderboardTable">
            <thead>
                <tr class="tableHeadRow">
                    <th>Rank</th>
                    <th>Username</th>
                    <th>Amount</th>
                </tr>
            </thead>

            <tbody class="tableBody">
            </tbody>
        </table>
    </main>

    <script src="assets/js/monthContainer.js"></script>
    <script src="assets/js/loadLeaderboard.js"></script>
</body>

</html>
